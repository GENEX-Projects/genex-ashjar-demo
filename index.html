<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GENEX - Ashjar Café</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-fog fog-1"></div>
  <div class="bg-fog fog-2"></div>
  <div class="bg-light light-1"></div>
  <div class="bg-light light-2"></div>

  <div id="beans-rain"></div>
  <div id="beans-ground"></div>

  <div class="page-shell">
    <header class="topbar customer-topbar">
      <div>
        <div class="brand-mini">G E N E X</div>
        <h1 class="title">أشجار كافيه</h1>
        <p class="subtitle">Premium Smart Ordering Experience</p>
      </div>
    </header>

    <main class="layout customer-layout">
      <section class="main-panel">
        <div id="langBox" class="hero-card">
          <div class="badge">Ashjar Smart Welcome</div>
          <h2 id="welcomeTitle">حياك الله في أشجار كافيه</h2>
          <p id="welcomeText">فضلاً اختر طريقة البدء للانتقال إلى تجربة الطلب</p>

          <div class="lang-actions">
            <button type="button" id="btnAr" class="btn primary large-btn">إبدأ</button>
            <button type="button" id="btnEn" class="btn secondary large-btn">Start</button>
          </div>
        </div>

        <div id="app"></div>
      </section>

      <aside class="side-panel">
        <div class="summary-card">
          <h3 id="summaryTitle">ملخص الطلب</h3>

          <div class="stats">
            <div class="stat-box">
              <span id="itemsLabel">العناصر</span>
              <strong id="itemCount">0</strong>
            </div>
            <div class="stat-box">
              <span id="totalLabel">الإجمالي</span>
              <strong id="totalAmount">0 SR</strong>
            </div>
          </div>

          <div id="cartPreview" class="cart-preview">
            لا توجد عناصر في السلة
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
