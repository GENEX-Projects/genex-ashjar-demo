<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GENEX Staff Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Staff Panel</h1>
    <div id="staffApp"></div>
  </div>

  <script>
    let staffLang = "ar";

    function speak(text, selectedLang = "ar") {
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = selectedLang === "ar" ? "ar-SA" : "en-US";
      speechSynthesis.cancel();
      speechSynthesis.speak(msg);
    }

    function renderStaff() {
      const saved = localStorage.getItem("currentOrder");
      const app = document.getElementById("staffApp");

      if (!saved) {
        app.innerHTML = `<h2>No Orders</h2>`;
        return;
      }

      const order = JSON.parse(saved);
      staffLang = order.lang || "ar";

      let itemsHtml = "";
      order.items.forEach(item => {
        itemsHtml += `<p>${staffLang === "ar" ? item.ar : item.en} - ${item.price} SR</p>`;
      });

      app.innerHTML = `
        <div class="card">
          <h2>${staffLang === "ar" ? "رقم الطلب" : "Order Number"}: #${order.number}</h2>
          <p>${staffLang === "ar" ? "الحالة" : "Status"}: ${order.status}</p>
          ${itemsHtml}
          <h3>${staffLang === "ar" ? "الإجمالي" : "Total"}: ${order.total} SR</h3>

          <button class="btn" onclick="acceptOrder()">${staffLang === "ar" ? "استلام الطلب" : "Accept Order"}</button>
          <button class="btn" onclick="markReady()">${staffLang === "ar" ? "تم التجهيز" : "Mark Ready"}</button>
          <button class="btn" onclick="clearOrder()">${staffLang === "ar" ? "مسح الطلب" : "Clear Order"}</button>
        </div>
      `;
    }

    function acceptOrder() {
      const saved = localStorage.getItem("currentOrder");
      if (!saved) return;

      const order = JSON.parse(saved);
      order.status = "preparing";
      localStorage.setItem("currentOrder", JSON.stringify(order));

      if (staffLang === "ar") {
        speak("تم استلام الطلب وبدأ التجهيز", "ar");
      } else {
        speak("Order accepted and preparation started", "en");
      }

      renderStaff();
    }

    function markReady() {
      const saved = localStorage.getItem("currentOrder");
      if (!saved) return;

      const order = JSON.parse(saved);
      order.status = "ready";
      localStorage.setItem("currentOrder", JSON.stringify(order));

      if (staffLang === "ar") {
        speak(`الطلب رقم ${order.number} جاهز للاستلام`, "ar");
      } else {
        speak(`Order number ${order.number} is ready for pickup`, "en");
      }

      renderStaff();
    }

    function clearOrder() {
      localStorage.removeItem("currentOrder");
      renderStaff();
    }

    renderStaff();
    setInterval(renderStaff, 1500);
  </script>
</body>
</html>
